<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開発日誌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090c; --surface: #0f1116; --card: #12141c;
      --border: #1c1f2e; --border2: #252838;
      --text: #dde0f0; --muted: #858ab0; --dim: #515573;
      --accent: #d4a030; --accent-l: rgba(212,160,48,.1); --accent-b: rgba(212,160,48,.22);
      --teal: #30c8a8; --coral: #e06858; --green: #38c078;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 640px; margin: 0 auto; padding: 32px 20px 60px; }

    /* 階層パンくず（ポータル › アプリ名。BASEと同じ構成） */
    .crumb-bar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 6px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: .82rem;
      flex-wrap: wrap;
    }
    .crumb {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none;
      padding: 4px 8px; border-radius: 7px;
      transition: background .12s, color .12s;
      background: none; border: none; font: inherit; cursor: pointer;
    }
    .crumb:hover { background: var(--card); color: var(--text); }
    .crumb.current { color: var(--text); font-weight: 600; cursor: default; }
    .crumb.current:hover { background: none; }
    .crumb-sep { color: var(--dim); font-size: .75rem; }
    .crumb-spacer { flex: 1; }

    /* Memory index panel */
    .memory-card {
      background: var(--card); border: 1px solid var(--accent-b);
      border-radius: 14px; padding: 16px 18px; margin-bottom: 20px;
    }
    .memory-hd {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .memory-title { font-size: .85rem; font-weight: 600; color: var(--accent); }
    .memory-updated {
      font-family: 'JetBrains Mono', monospace; font-size: .62rem;
      color: var(--dim); margin-left: auto;
    }
    .memory-list { display: flex; flex-direction: column; gap: 8px; }
    .memory-item { font-size: .8rem; line-height: 1.6; }
    .memory-item-title { font-weight: 600; color: var(--text); }
    .memory-item-desc { color: var(--muted); }

    /* Entries */
    .entries { display: flex; flex-direction: column; gap: 10px; }
    .entry {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      transition: border-color .15s;
    }
    .entry:hover { border-color: var(--border2); }
    .entry-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .app-badge {
      font-family: 'Space Grotesk', sans-serif; font-size: .76rem; font-weight: 600;
      padding: 3px 10px; border-radius: 99px;
      background: color-mix(in srgb, var(--c) 16%, transparent);
      border: 1px solid color-mix(in srgb, var(--c) 50%, transparent);
      color: var(--c);
    }
    .author-badge {
      font-family: 'JetBrains Mono', monospace; font-size: .62rem; font-weight: 500;
      padding: 2px 7px; border-radius: 99px;
    }
    .badge-claude { background: var(--accent-l); border: 1px solid var(--accent-b); color: var(--accent); }
    .badge-manual { background: rgba(48,200,168,.08); border: 1px solid rgba(48,200,168,.2); color: var(--teal); }
    .entry-date {
      font-family: 'JetBrains Mono', monospace; font-size: .62rem;
      color: var(--dim); margin-left: auto;
    }

    /* Filter bar */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .chip {
      font-family: 'Space Grotesk', sans-serif; font-size: .76rem; font-weight: 500;
      background: var(--surface); border: 1px solid var(--border2); color: var(--muted);
      padding: 4px 10px; border-radius: 99px; cursor: pointer; transition: all .15s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .chip:hover { border-color: var(--c, var(--border2)); color: var(--text); }
    .chip.active {
      background: color-mix(in srgb, var(--c, var(--accent)) 18%, transparent);
      border-color: color-mix(in srgb, var(--c, var(--accent)) 55%, transparent);
      color: var(--c, var(--accent));
    }
    .chip-n { font-family: 'JetBrains Mono', monospace; font-size: .64rem; opacity: .75; }
    .entry-body { font-size: .875rem; color: #bcc0d4; line-height: 1.7; white-space: pre-wrap; }
    .entry-del {
      background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: .75rem; padding: 2px 6px; border-radius: 4px;
      margin-left: 4px; transition: color .15s;
    }
    .entry-del:hover { color: var(--coral); }
    .empty { text-align: center; padding: 3rem; color: var(--dim); font-size: .85rem; }
    .count-lbl {
      font-family: 'JetBrains Mono', monospace; font-size: .6rem;
      color: var(--dim); margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="crumb-bar">
    <a class="crumb" href="/" title="アプリ一覧へ戻る">🏠 ポータル</a>
    <span class="crumb-sep">›</span>
    <span class="crumb current">📓 LOG</span>
    <span class="crumb-spacer"></span>
  </div>
  <div class="wrap">
    <div class="memory-card">
      <div class="memory-hd">
        <span class="memory-title">🧠 現在の記憶（MEMORY.md）</span>
        <span class="memory-updated" id="memoryUpdated"></span>
      </div>
      <div class="memory-list" id="memoryList"></div>
    </div>

    <div class="filter-bar" id="filterBar"></div>
    <div class="count-lbl" id="countLbl"></div>
    <div class="entries" id="entries"><div class="empty">まだ記録がありません</div></div>
  </div>

  <script>
    const BASE = '/diary';
    let entries = [];
    let currentFilter = null;

    const APP_META = {
      general:           { label: 'general',         icon: '🗒', color: '#858ab0' },
      portal:            { label: 'portal',           icon: '🏠', color: '#d4a030' },
      'obsidian-sync':   { label: 'obsidian-sync',    icon: '📝', color: '#9b8cff' },
      'goma-monitor':    { label: 'goma-monitor',     icon: '🐾', color: '#e0a858' },
      'marumie-jp':      { label: 'marumie-jp',       icon: '🔍', color: '#30c8a8' },
      onepiece:          { label: 'onepiece',         icon: '🏴‍☠️', color: '#e06858' },
      'one-piece':       { label: 'onepiece',         icon: '🏴‍☠️', color: '#e06858' },
      'briefing-bot':    { label: 'briefing-bot',     icon: '📰', color: '#5aa9e6' },
      'claude-usage':    { label: 'claude-usage',     icon: '⚡', color: '#f0d048' },
      'agent-dashboard': { label: 'agent-dashboard',  icon: '👥', color: '#c084fc' },
      'task-manager':    { label: 'task-manager',     icon: '✅', color: '#38c078' },
      'deploy-infra':    { label: 'deploy-infra',     icon: '🛠', color: '#ff9f5a' },
    };
    const metaFor = app => APP_META[app] || { label: app, icon: '📦', color: '#515573' };

    async function load() {
      const res = await fetch(`${BASE}/api/entries`);
      entries = await res.json();
      render();
    }

    async function loadMemoryIndex() {
      const res = await fetch(`${BASE}/api/memory-index`);
      const { updatedAt, items } = await res.json();
      document.getElementById('memoryUpdated').textContent = updatedAt ? fmt(updatedAt) : '';
      const list = document.getElementById('memoryList');
      list.innerHTML = items.length
        ? items.map(it => `<div class="memory-item"><span class="memory-item-title">${esc(it.title)}</span> — <span class="memory-item-desc">${esc(it.desc)}</span></div>`).join('')
        : `<div class="memory-item memory-item-desc">まだ記憶がありません</div>`;
    }

    function setFilter(app) { currentFilter = app; render(); }

    function renderFilterBar() {
      const bar = document.getElementById('filterBar');
      if (!entries.length) { bar.innerHTML = ''; return; }
      const counts = {};
      entries.forEach(e => { counts[e.app] = (counts[e.app] || 0) + 1; });
      const apps = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
      const allChip = `<button class="chip ${currentFilter === null ? 'active' : ''}" data-filter="">すべて <span class="chip-n">${entries.length}</span></button>`;
      const appChips = apps.map(a => {
        const m = metaFor(a);
        return `<button class="chip ${currentFilter === a ? 'active' : ''}" style="--c:${m.color}" data-filter="${escAttr(a)}">${m.icon} ${esc(m.label)} <span class="chip-n">${counts[a]}</span></button>`;
      });
      bar.innerHTML = [allChip, ...appChips].join('');
    }

    function render() {
      renderFilterBar();
      const filtered = currentFilter ? entries.filter(e => e.app === currentFilter) : entries;
      const el = document.getElementById('entries');
      document.getElementById('countLbl').textContent = filtered.length
        ? `${filtered.length} 件${currentFilter ? '（絞り込み中）' : ''}`
        : '';
      if (!filtered.length) { el.innerHTML = `<div class="empty">${entries.length ? '該当する記録がありません' : 'まだ記録がありません'}</div>`; return; }
      el.innerHTML = filtered.map(e => {
        const m = metaFor(e.app);
        return `
        <div class="entry">
          <div class="entry-hd">
            <span class="app-badge" style="--c:${m.color}">${m.icon} ${esc(m.label)}</span>
            <span class="author-badge ${e.author === 'claude' ? 'badge-claude' : 'badge-manual'}">${e.author === 'claude' ? '🤖 Claude' : '✍️ 手入力'}</span>
            <span class="entry-date">${fmt(e.date)}</span>
            <button class="entry-del" data-id="${escAttr(e.id)}" title="削除">✕</button>
          </div>
          <div class="entry-body">${esc(e.content)}</div>
        </div>`;
      }).join('');
    }

    async function del(id) {
      if (!confirm('削除しますか？')) return;
      await fetch(`${BASE}/api/entries/${id}`, { method: 'DELETE' });
      load();
    }

    // Event delegation instead of inline onclick="" (which would need the
    // attacker-controlled app value to be safely embedded twice: once as an
    // HTML attribute and once as inline JS source — data-* + listener avoids that entirely).
    document.getElementById('filterBar').addEventListener('click', e => {
      const btn = e.target.closest('button[data-filter]');
      if (!btn) return;
      setFilter(btn.dataset.filter || null);
    });
    document.getElementById('entries').addEventListener('click', e => {
      const btn = e.target.closest('button[data-id]');
      if (btn) del(btn.dataset.id);
    });

    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // For values interpolated into an HTML attribute (not just text content) — also escapes quotes,
    // since attribute values need that even where esc() (text-node only) doesn't.
    const escAttr = s => esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const fmt = iso => {
      const d = new Date(iso);
      return d.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', month: 'numeric', day: 'numeric' })
        + ' ' + d.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit' });
    };

    load();
    loadMemoryIndex();
  </script>
</body>
</html>
